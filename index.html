<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button class="dark-toggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>
    <h1>My Image Gallery</h1>

    <div class="buttons">
    <button onclick="filterImages('all', this)" class="active">All</button>
    <button onclick="filterImages('nature', this)">Nature</button>
    <button onclick="filterImages('mountain', this)">Mountain</button>
    <button onclick="filterImages('sea', this)">Sea</button>
    <button onclick="filterImages('Animals', this)">Animals</button>
</div>
    <div class="gallery">
        <img src="https://picsum.photos/id/1015/400/300"  class="sea" onclick="openLightbox(0)">
        <img src="https://picsum.photos/id/1016/400/300" class="mountain" onclick="openLightbox(1)">
        <img src="https://picsum.photos/id/1018/400/300"  class="mountain" onclick="openLightbox(2)">
        <img src="https://picsum.photos/id/1020/400/300" class="Animals" onclick="openLightbox(3)">
        <img src="https://picsum.photos/id/1025/400/300" class="Animals" onclick="openLightbox(4)">
<img src="https://picsum.photos/id/1035/400/300" class="mountain" onclick="openLightbox(5)">
<img src="https://picsum.photos/id/1040/400/300" class="nature" onclick="openLightbox(6)">
<img src="https://picsum.photos/id/1050/400/300" class="sea" onclick="openLightbox(7)">
<img src="https://picsum.photos/id/1055/400/300"  onclick="openLightbox(8)">
<img src="https://picsum.photos/id/1060/400/300"  onclick="openLightbox(9)">
<img src="https://picsum.photos/id/1065/400/300"  onclick="openLightbox(10)">
<img src="https://picsum.photos/id/1070/400/300"  onclick="openLightbox(11)">
    </div>

    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>
        <button onclick="prevImage()">❮</button>
        <img id="lightbox-img">
        <button onclick="nextImage()">❯</button>
    </div>

<script src="script.js"></script>
</body>
</html>
